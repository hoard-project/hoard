site_name: Hoard
site_description: eBPF zero-copy file replication to S3
site_url: https://hoard-project.github.io/hoard/
repo_url: https://github.com/hoard-project/hoard
repo_name: hoard-project/hoard
edit_uri: tree/main/website/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github
  favicon: assets/logo.svg
  logo: assets/logo.svg

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Guides:
      - Configuration: configuration.md
      - Nomad Integration: nomad.md
      - Nomad Lifecycle: nomad-lifecycle.md
      - Operations: operations.md
      - Architecture: architecture.md
  - Reference:
      - CLI: reference/cli.md
      - Env Vars: reference/env-vars.md
      - Control Socket: reference/control-socket.md
