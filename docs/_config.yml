title: Hoard
description: eBPF zero-copy file replication to S3
baseurl: "/hoard"
url: "https://hoard-project.github.io"

remote_theme: just-the-docs/just-the-docs

color_scheme: dark

aux_links:
  "GitHub": "https://github.com/hoard-project/hoard"
  "Releases": "https://github.com/hoard-project/hoard/releases"

nav_external_links:
  - title: GitHub
    url: https://github.com/hoard-project/hoard

search_enabled: true
search:
  heading_level: 3
  previews: 3

heading_anchors: true

footer_content: "GPL-3.0 · <a href=\"https://github.com/hoard-project/hoard\">hoard-project/hoard</a>"

callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  tip:
    title: Tip
    color: green
  important:
    title: Important
    color: purple

back_to_top: true
back_to_top_text: "↑ Top"

last_edit_timestamp: true
last_edit_time_format: "%Y-%m-%d"

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
