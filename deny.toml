# cargo-deny configuration for Hoard
# https://embarkstudios.github.io/cargo-deny/

[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"
notice = "warn"
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "OpenSSL",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8
exceptions = [
    { name = "libsqlite3-sys", allow = ["Unlicense"] },
]

[bans]
multiple-versions = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
