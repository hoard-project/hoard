# cargo-deny configuration for Hoard
# https://embarkstudios.github.io/cargo-deny/ (cargo-deny >= 0.19)

[graph]
targets = []
all-features = false
exclude = []

[output]
feature-depth = 1

[advisories]
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "OpenSSL",
    "MPL-2.0",
    "CC0-1.0",
    "GPL-3.0-or-later",
    "GPL-3.0",
]
confidence-threshold = 0.8
exceptions = [
    { name = "libsqlite3-sys", allow = ["Unlicense"] },
]

[bans]
multiple-versions = "warn"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
