version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    assignees:
      - "hoard-project"
    labels:
      - "dependencies"
    commit-message:
      prefix: "cargo"
      include: "scope"
    groups:
      patch:
        patterns:
          - "*"
        update-types:
          - "patch"
    ignore:
      # Pinned: aya 0.14 has API changes, review manually
      - dependency-name: "aya"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
