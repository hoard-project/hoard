version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    assignees:
      - "hoard-project"
    labels:
      - "dependencies"
    commit-message:
      prefix: "cargo"
      include: "scope"
    groups:
      patch:
        patterns:
          - "*"
        update-types:
          - "patch"
    ignore:
      # Major bumps → review manually (API changes expected)
      - dependency-name: "aya"
        update-types: ["version-update:semver-major"]
      # hmac 0.13 requires digest 0.11, incompatible with sha2 0.10
      - dependency-name: "hmac"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
