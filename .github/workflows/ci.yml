name: Verify & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Static checks + test (x86_64 only, architecture-agnostic) ──
  check:
    name: "fmt / clippy / test"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libelf-dev clang llvm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --no-deps

      - name: Test
        run: cargo test --all-targets

  # ── Build matrix: x86_64 + aarch64 ────────────────────────
  build:
    name: "build (${{ matrix.target }})"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bpf_arch: x86
          - runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            bpf_arch: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libelf-dev clang llvm

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build release
        run: cargo build --release

      - name: Binary info
        run: |
          ls -lh target/release/hoard
          file target/release/hoard

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: hoard-${{ matrix.target }}
          path: target/release/hoard

  # ── BPF compile matrix: x86_64 + aarch64 ──────────────────
  bpf:
    name: "bpf (${{ matrix.bpf_arch }})"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            bpf_arch: x86
          - runner: ubuntu-22.04-arm
            bpf_arch: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Install clang + bpftool
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm linux-tools-common linux-tools-generic

      - name: Generate vmlinux.h (from runner kernel BTF)
        run: |
          bpftool btf dump file /sys/kernel/btf/vmlinux format c > src/bpf/vmlinux.h 2>/dev/null || \
            echo "⚠ bpftool failed, using committed vmlinux.h"

      - name: Compile BPF
        run: |
          clang -O2 -g -target bpf -D__TARGET_ARCH_${{ matrix.bpf_arch }} \
            -Wall -Werror \
            -Isrc/bpf \
            -c src/bpf/hoard.bpf.c \
            -o hoard.bpf.o
          ls -lh hoard.bpf.o

      - name: Upload BPF object
        uses: actions/upload-artifact@v7
        with:
          name: hoard-bpf-o-${{ matrix.bpf_arch }}
          path: hoard.bpf.o
