name: Verify & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Static checks + unit tests ──
  check:
    name: "fmt / clippy / test"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@df4cb1cf17f246ab2dd04c67210db2d3e3ff53f7  # v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libelf-dev clang llvm

      - uses: dtolnay/rust-toolchain@29eef3381d2e327c7e04d0a92d25543c4b8d4bc8  # stable
        with:
          components: rustfmt, clippy

      - name: Verify toolchain
        run: |
          rustc --version
          cargo --version
          rustup show

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --no-deps

      - name: Unit tests
        run: cargo test

  # ── Build matrix: x86_64 + aarch64 ─────────────────────────
  build:
    name: "build (${{ matrix.target }})"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@df4cb1cf17f246ab2dd04c67210db2d3e3ff53f7  # v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libelf-dev clang llvm

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Verify toolchain
        run: |
          rustc --version
          cargo --version

      - name: Build release
        run: cargo build --release

      - name: Collect artifacts
        run: |
          ls -lh target/release/hoard
          BPF_OBJ=$(find target/release/build -name hoard.bpf.o -type f | head -1)
          if [ -n "$BPF_OBJ" ] && [ -s "$BPF_OBJ" ]; then
            echo "BPF: $BPF_OBJ ($(stat -c%s "$BPF_OBJ") bytes)"
          else
            echo "::error::BPF object not found or empty!"
            exit 1
          fi
          mkdir -p dist
          cp target/release/hoard dist/hoard
          cp "$BPF_OBJ" dist/hoard.bpf.o
          ls -lh dist/

      - name: Upload binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: hoard-${{ matrix.target }}
          path: |
            dist/hoard
            dist/hoard.bpf.o
