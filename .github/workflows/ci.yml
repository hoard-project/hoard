name: Verify & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Static checks + test (architecture-agnostic) ──
  check:
    name: "fmt / clippy / test"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libelf-dev clang llvm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --no-deps

      - name: Test
        run: cargo test --all-targets

  # ── Build matrix: x86_64 + aarch64 (binary + BPF) ─────────
  build:
    name: "build (${{ matrix.target }})"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bpf_arch: x86
          - runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            bpf_arch: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libelf-dev clang llvm

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build release
        run: cargo build --release

      - name: Collect artifacts
        run: |
          ls -lh target/release/hoard
          BPF_OBJ=$(find target/release/build -name hoard.bpf.o -type f | head -1)
          if [ -n "$BPF_OBJ" ] && [ -s "$BPF_OBJ" ]; then
            echo "BPF object: $BPF_OBJ ($(stat -c%s "$BPF_OBJ") bytes)"
          else
            echo "::error::BPF object not found or empty!"
            exit 1
          fi
          mkdir -p dist
          cp target/release/hoard dist/hoard
          cp "$BPF_OBJ" dist/hoard.bpf.o
          ls -lh dist/

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: hoard-${{ matrix.target }}
          path: |
            dist/hoard
            dist/hoard.bpf.o

  # ── E2E smoke test (x86_64, MinIO container) ───────────────
  e2e:
    name: "e2e (MinIO)"
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin123 \
            minio/minio:latest server /data --console-address ":9001"
          sleep 3
          docker logs minio --tail 5

      - name: Install mc CLI
        run: |
          curl -sL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc
          mc alias set local http://127.0.0.1:9000 minioadmin minioadmin123
          mc mb local/test-bucket 2>/dev/null || true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: hoard-x86_64-unknown-linux-gnu

      - name: Setup hoard
        run: |
          ls -laR dist/
          [ -f dist/hoard ] || { echo "::error::dist/hoard not found"; exit 1; }
          [ -f dist/hoard.bpf.o ] || { echo "::error::dist/hoard.bpf.o not found"; exit 1; }
          ln -sf "$(realpath dist/hoard)" /usr/local/bin/hoard
          mkdir -p /usr/lib/hoard /var/lib/hoard/volumes
          cp dist/hoard.bpf.o /usr/lib/hoard/hoard.bpf.o
          hoard --version || true
          cat > /tmp/e2e.toml << 'TOML'
          [daemon]
          mode = "standalone"
          service = "e2e"
          [watch]
          path = "/var/lib/hoard/volumes"
          [s3]
          endpoint = "http://127.0.0.1:9000"
          bucket = "test-bucket"
          prefix = "e2e"
          region = "us-east-1"
          access_key = "minioadmin"
          secret_key = "minioadmin123"
          no_sign = true
          [gc]
          interval_secs = 99999
          ttl_days = 7
          [resilience]
          pending_db = "/tmp/pending.db"
          max_upload_retries = 3
          dead_letter_dir = "/tmp/dead-letter"
          [filter]
          extensions = ["db", "sqlite", "sqlite3", "log", "json", "csv"]
          TOML

      - name: Run hoard
        run: |
          hoard --config /tmp/e2e.toml > /tmp/hoard-e2e.log 2>&1 &
          sleep 4
          if ! pgrep hoard > /dev/null; then
            echo "::error::Hoard failed to start"
            cat /tmp/hoard-e2e.log
            exit 1
          fi
          echo "Hoard started (PID=$(pgrep hoard))"

      - name: Smoke test — create files
        run: |
          mkdir -p /var/lib/hoard/volumes/e2e-smoke
          sqlite3 /var/lib/hoard/volumes/e2e-smoke/test.db \
            "PRAGMA journal_mode=WAL; CREATE TABLE t(x);"
          for i in $(seq 1 5); do
            sqlite3 /var/lib/hoard/volumes/e2e-smoke/test.db "INSERT INTO t VALUES($i);"
          done
          echo "e2e smoke test $(date)" > /var/lib/hoard/volumes/e2e-smoke/app.log
          echo "Created test files"
          ls -la /var/lib/hoard/volumes/e2e-smoke/

      - name: Wait for drain + verify
        run: |
          echo "Waiting for periodic drain (35s)..."
          sleep 35

          echo "=== Hoard logs ==="
          grep -E "upload|drain|WAL" /tmp/hoard-e2e.log || true

          echo "=== MinIO inventory ==="
          mc ls local/test-bucket/e2e/ --recursive || true

          echo "=== Assertions ==="
          # SQLite DB
          if mc ls local/test-bucket/e2e/ --recursive | grep -q "e2e-smoke/test.db"; then
            echo "✅ test.db uploaded"
          else
            echo "::error::test.db NOT uploaded"
            exit 1
          fi

          # Log file
          if mc ls local/test-bucket/e2e/ --recursive | grep -q "e2e-smoke/app.log"; then
            echo "✅ app.log uploaded"
          else
            echo "::error::app.log NOT uploaded"
            exit 1
          fi

          # Content check
          LOG_CONTENT=$(mc cat local/test-bucket/e2e/e2e-smoke/app.log 2>/dev/null)
          if echo "$LOG_CONTENT" | grep -q "e2e smoke test"; then
            echo "✅ app.log content verified"
          else
            echo "::error::app.log content mismatch"
            exit 1
          fi

          echo "=== All e2e checks passed ==="
