name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: "release (${{ matrix.target }})"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bpf_arch: x86
            artifact_name: hoard-x86_64
          - runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            bpf_arch: arm64
            artifact_name: hoard-aarch64
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libelf-dev clang llvm

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Rename + strip + checksum
        run: |
          strip target/release/hoard
          mv target/release/hoard "target/release/${{ matrix.artifact_name }}"
          sha256sum "target/release/${{ matrix.artifact_name }}" > "target/release/${{ matrix.artifact_name }}.sha256"
          ls -lh "target/release/${{ matrix.artifact_name }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/${{ matrix.artifact_name }}
            target/release/${{ matrix.artifact_name }}.sha256
          name: ${{ github.ref_name }}
          generate_release_notes: true
