name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

jobs:
  release:
    name: "release (${{ matrix.target }})"
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bpf_arch: x86
            artifact_name: hoard-x86_64
          - runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            bpf_arch: arm64
            artifact_name: hoard-aarch64
    steps:
      - uses: actions/checkout@df4cb1cf17f246ab2dd04c67210db2d3e3ff53f7  # v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libelf-dev clang llvm

      - uses: dtolnay/rust-toolchain@29eef3381d2e327c7e04d0a92d25543c4b8d4bc8  # stable

      - name: Build release
        run: cargo build --release

      - name: Prepare artifacts
        run: |
          # --- Binary ---
          strip target/release/hoard
          mv target/release/hoard "target/release/${{ matrix.artifact_name }}"
          # Use basename so .sha256 contains only the filename
          (cd target/release && sha256sum "${{ matrix.artifact_name }}" > "${{ matrix.artifact_name }}.sha256")

          # --- BPF object (compiled by build.rs) ---
          BPF_OBJ=$(find target -name hoard.bpf.o -type f | head -1)
          echo "BPF object: $BPF_OBJ ($(stat -c%s "$BPF_OBJ") bytes)"
          cp "$BPF_OBJ" "target/release/${{ matrix.artifact_name }}.bpf.o"
          (cd target/release && sha256sum "${{ matrix.artifact_name }}.bpf.o" > "${{ matrix.artifact_name }}.bpf.o.sha256")

          # --- Summary ---
          ls -lh target/release/${{ matrix.artifact_name }}*

      - name: Generate SLSA provenance
        uses: actions/attest-build-provenance@96b4a1e53b3ac7f2c692f07ed7eac2b7bdf6c1b5  # v2
        with:
          subject-path: |
            target/release/${{ matrix.artifact_name }}
            target/release/${{ matrix.artifact_name }}.bpf.o

      - name: Upload to release
        uses: softprops/action-gh-release@3bb1273b40e2abc5fb1e6c83d77b47b60903dda2  # v2
        with:
          files: |
            target/release/${{ matrix.artifact_name }}
            target/release/${{ matrix.artifact_name }}.sha256
            target/release/${{ matrix.artifact_name }}.bpf.o
            target/release/${{ matrix.artifact_name }}.bpf.o.sha256
          name: ${{ github.ref_name }}
          generate_release_notes: true
