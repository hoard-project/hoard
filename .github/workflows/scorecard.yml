name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '30 1 * * 6'  # Saturday 01:30 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-22.04
    permissions:
      security-events: write
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1cf17f246ab2dd04c67210db2d3e3ff53f7  # v6
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@99c09fe88716b36d1c82935b02bce13319fcdb6c  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@b0c4fd759e31af04931ba64d6495a5808eef89e9  # v3
        with:
          sarif_file: results.sarif
