name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # weekly on Monday 06:00 UTC
  workflow_dispatch:

permissions: read-all

jobs:
  # ── CodeQL: static analysis for Rust + C ──────────────────
  codeql:
    name: "CodeQL"
    runs-on: ubuntu-22.04
    permissions:
      security-events: write
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8ff85221d12737ec1137e6a892722e5130f32d05  # v3
        with:
          languages: rust, c-cpp
          queries: security-extended,security-and-quality

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libelf-dev

      - name: Build (CodeQL autobuild fallback)
        run: cargo build --release

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8ff85221d12737ec1137e6a892722e5130f32d05  # v3
        with:
          category: "/language:rust,c-cpp"

  # ── cargo audit: Rust dependency vulnerability scan ───────
  audit:
    name: "cargo audit"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v6

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

  # ── cargo deny: license + duplicate dependency check ──────
  deny:
    name: "cargo deny"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v6

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check licenses
        run: cargo deny check licenses

      - name: Check for duplicate/advisory crates
        run: cargo deny check advisories
